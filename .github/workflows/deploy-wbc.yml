name: Deploy app
on:
  push:
    branches:
      - wbc
jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only --app mlb-led-cloud-yaetca
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_WBC }}
